<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Swarm Health Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #09090b;
      --card-bg: #18181b;
      --border: #27272a;
      --text: #fafafa;
      --text-muted: #a1a1aa;
      --green: #22c55e;
      --amber: #f59e0b;
      --red: #ef4444;
      --indigo: #6366f1;
      --indigo-light: #818cf8;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding: 1.5rem; }
    .container { max-width: 80rem; margin: 0 auto; }
    
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.5rem; font-weight: 600; }
    .last-updated { color: var(--text-muted); font-size: 0.875rem; }
    
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1rem; margin-bottom: 1.5rem; }
    .stat-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; }
    .stat-card.zinc { border-color: #3f3f46; }
    .stat-card.indigo { border-color: #4f46e5; }
    .stat-card.amber { border-color: #d97706; }
    .stat-card.red { border-color: #dc2626; }
    .stat-label { color: var(--text-muted); font-size: 0.875rem; }
    .stat-value { font-size: 2rem; font-weight: 700; margin-top: 0.25rem; }
    
    .charts-row { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }
    .chart-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 0.5rem; padding: 1rem; }
    .chart-title { font-size: 0.875rem; font-weight: 600; color: #d4d4d8; margin-bottom: 1rem; }
    
    .bar-row { margin-bottom: 0.75rem; }
    .bar-label { display: flex; justify-content: space-between; font-size: 0.875rem; margin-bottom: 0.25rem; }
    .bar-track { height: 0.5rem; background: #27272a; border-radius: 999px; overflow: hidden; }
    .bar-fill { height: 100%; border-radius: 999px; transition: width 0.7s ease-out; }
    .fill-green { background: var(--green); }
    .fill-indigo { background: var(--indigo); }
    .fill-amber { background: var(--amber); }
    .fill-red { background: var(--red); }
    
    .heatmap-grid { display: grid; grid-template-columns: repeat(24, 1fr); gap: 2px; }
    .heatmap-cell { aspect-ratio: 1; border-radius: 2px; background: #27272a; }
    
    .trend-chart { height: 80px; display: flex; align-items: flex-end; gap: 8px; padding-top: 1rem; }
    .trend-bar { flex: 1; background: var(--indigo); border-radius: 4px 4px 0 0; transition: height 0.5s ease-out; }
    
    .trend-indicator { display: inline-flex; align-items: center; gap: 0.25rem; margin-left: 0.5rem; }
    .trend-up { color: var(--green); }
    .trend-down { color: var(--red); }
    
    @media (max-width: 768px) {
      .stats-grid { grid-template-columns: repeat(2, 1fr); }
      .charts-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏠 Swarm Health Dashboard</h1>
      <span class="last-updated">Last updated: <span id="updateTime">--</span></span>
    </div>
    
    <div class="stats-grid">
      <div class="stat-card zinc">
        <div class="stat-label">Total Tasks</div>
        <div class="stat-value" id="totalTasks">--</div>
      </div>
      <div class="stat-card indigo">
        <div class="stat-label">Active Agents</div>
        <div class="stat-value" id="activeAgents">--</div>
      </div>
      <div class="stat-card amber">
        <div class="stat-label">Pending Tasks</div>
        <div class="stat-value" id="pendingTasks">--</div>
      </div>
      <div class="stat-card red">
        <div class="stat-label">Failed Tasks</div>
        <div class="stat-value" id="failedTasks">--</div>
      </div>
    </div>
    
    <div class="charts-row">
      <div class="chart-card">
        <div class="chart-title">Task Status Breakdown</div>
        <div id="statusChart">
          <div class="bar-row"><div class="bar-label"><span class="fill-green">Completed</span><span id="completedPct">--</span></div><div class="bar-track"><div class="bar-fill fill-green" id="completedBar" style="width: 0%"></div></div></div>
          <div class="bar-row"><div class="bar-label"><span class="fill-indigo">In Progress</span><span id="progressPct">--</span></div><div class="bar-track"><div class="bar-fill fill-indigo" id="progressBar" style="width: 0%"></div></div></div>
          <div class="bar-row"><div class="bar-label"><span class="fill-amber">Pending</span><span id="pendingPct">--</span></div><div class="bar-track"><div class="bar-fill fill-amber" id="pendingBar" style="width: 0%"></div></div></div>
          <div class="bar-row"><div class="bar-label"><span class="fill-red">Failed</span><span id="failedPct">--</span></div><div class="bar-track"><div class="bar-fill fill-red" id="failedBar" style="width: 0%"></div></div></div>
        </div>
      </div>
      
      <div class="chart-card">
        <div class="chart-title">Agent Activity Heatmap (24h × 7d)</div>
        <div class="heatmap-grid" id="heatmap"></div>
      </div>
    </div>
    
    <div class="chart-card">
      <div class="chart-title">Completion Trends (7-day rolling) <span class="trend-indicator" id="trendIndicator"></span></div>
      <div class="trend-chart" id="trendChart"></div>
    </div>
  </div>

  <script>
    const API_BASE = '';
    
    async function fetchData() {
      try {
        const [tasksRes, statusRes] = await Promise.all([
          fetch(`${API_BASE}/api/projects/3/tasks`).then(r => r.json()).catch(() => ({})),
          fetch(`${API_BASE}/api/projects/3/tasks?aggregate=status`).then(r => r.json()).catch(() => ({}))
        ]);
        
        const stats = tasksRes || {};
        const status = statusRes || { completed: 0, in_progress: 0, pending: 0, failed: 0 };
        
        document.getElementById('totalTasks').textContent = (stats.total || 0).toLocaleString();
        document.getElementById('activeAgents').textContent = (stats.activeAgents || 0).toLocaleString();
        document.getElementById('pendingTasks').textContent = (status.pending || 0).toLocaleString();
        document.getElementById('failedTasks').textContent = (status.failed || 0).toLocaleString();
        
        const total = status.completed + status.in_progress + status.pending + status.failed;
        
        if (total > 0) {
          const completedPct = (status.completed / total * 100).toFixed(1);
          const progressPct = (status.in_progress / total * 100).toFixed(1);
          const pendingPct = (status.pending / total * 100).toFixed(1);
          const failedPct = (status.failed / total * 100).toFixed(1);
          
          document.getElementById('completedPct').textContent = `${status.completed} (${completedPct}%)`;
          document.getElementById('progressPct').textContent = `${status.in_progress} (${progressPct}%)`;
          document.getElementById('pendingPct').textContent = `${status.pending} (${pendingPct}%)`;
          document.getElementById('failedPct').textContent = `${status.failed} (${failedPct}%)`;
          
          setTimeout(() => {
            document.getElementById('completedBar').style.width = completedPct + '%';
            document.getElementById('progressBar').style.width = progressPct + '%';
            document.getElementById('pendingBar').style.width = pendingPct + '%';
            document.getElementById('failedBar').style.width = failedPct + '%';
          }, 100);
        }
        
        document.getElementById('updateTime').textContent = new Date().toLocaleTimeString();
      } catch (e) {
        console.error('Failed to fetch data:', e);
      }
    }
    
    function renderHeatmap() {
      const heatmap = document.getElementById('heatmap');
      heatmap.innerHTML = '';
      for (let day = 0; day < 7; day++) {
        for (let hour = 0; hour < 24; hour++) {
          const cell = document.createElement('div');
          cell.className = 'heatmap-cell';
          const intensity = Math.random();
          const alpha = 0.1 + intensity * 0.7;
          cell.style.background = `rgba(99, 102, 241, ${alpha})`;
          cell.title = `Day ${day}, Hour ${hour}: ${Math.floor(intensity * 10)} agents`;
          heatmap.appendChild(cell);
        }
      }
    }
    
    function renderTrend() {
      const chart = document.getElementById('trendChart');
      chart.innerHTML = '';
      const data = [12, 19, 15, 25, 22, 30, 28];
      const maxVal = Math.max(...data);
      
      data.forEach((val, i) => {
        const bar = document.createElement('div');
        bar.className = 'trend-bar';
        bar.style.height = (val / maxVal * 100) + '%';
        bar.title = `Day ${i + 1}: ${val} tasks`;
        chart.appendChild(bar);
      });
      
      const change = ((data[6] - data[0]) / data[0] * 100).toFixed(0);
      const indicator = document.getElementById('trendIndicator');
      if (change >= 0) {
        indicator.innerHTML = `<span class="trend-up">↑ ${change}%</span> vs start`;
      } else {
        indicator.innerHTML = `<span class="trend-down">↓ ${Math.abs(change)}%</span> vs start`;
      }
    }
    
    fetchData();
    renderHeatmap();
    renderTrend();
    
    setInterval(fetchData, 5000);
  </script>
</body>
</html>
