<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ClawDesk — Agent Orchestration</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f0f0f;--card:#1a1a1a;--border:#2a2a2a;--text:#e0e0e0;--dim:#888;--accent:#4f8cff;--green:#34d399;--yellow:#fbbf24;--red:#f87171;--orange:#fb923c;--purple:#a78bfa}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
nav{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;gap:0;position:sticky;top:0;z-index:10}
nav button{background:none;border:none;color:var(--dim);padding:14px 20px;cursor:pointer;font-size:14px;border-bottom:2px solid transparent;transition:.15s}
nav button:hover{color:var(--text)}
nav button.active{color:var(--accent);border-bottom-color:var(--accent)}
.container{max-width:1100px;margin:0 auto;padding:24px}
.tab{display:none}.tab.active{display:block}
h2{font-size:18px;margin-bottom:16px;font-weight:600}
h3{font-size:15px;margin-bottom:10px;font-weight:600;color:var(--dim)}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:24px}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:18px}
.stat-card .label{font-size:12px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px}
.stat-card .value{font-size:28px;font-weight:700;margin-top:4px}
.stat-card .value.green{color:var(--green)}.stat-card .value.yellow{color:var(--yellow)}.stat-card .value.accent{color:var(--accent)}
table{width:100%;border-collapse:collapse;background:var(--card);border-radius:10px;overflow:hidden;border:1px solid var(--border)}
th{text-align:left;padding:10px 14px;font-size:12px;color:var(--dim);text-transform:uppercase;border-bottom:1px solid var(--border)}
td{padding:10px 14px;font-size:14px;border-bottom:1px solid var(--border)}
tr:last-child td{border-bottom:none}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:600}
.badge-active,.badge-in_progress{background:#1a3a2a;color:var(--green)}
.badge-idle,.badge-pending{background:#2a2a1a;color:var(--yellow)}
.badge-paused,.badge-failed{background:#3a1a1a;color:var(--red)}
.badge-completed,.badge-done{background:#1a2a3a;color:var(--accent)}
.badge-ok{background:#1a3a2a;color:var(--green)}
.badge-error{background:#3a1a1a;color:var(--red)}
.budget-bar{height:6px;background:var(--border);border-radius:3px;width:100px;display:inline-block;vertical-align:middle;margin-left:8px}
.budget-fill{height:100%;border-radius:3px;background:var(--accent)}
.btn{padding:6px 14px;border:none;border-radius:6px;cursor:pointer;font-size:13px;font-weight:500;transition:.15s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{opacity:.85}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{opacity:.85}
.btn-success{background:var(--green);color:#000}.btn-success:hover{opacity:.85}
.btn-purple{background:var(--purple);color:#000}.btn-purple:hover{opacity:.85}
.btn-sm{padding:4px 10px;font-size:12px}
.form-row{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap}
.form-row input,.form-row select{background:var(--card);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px}
.form-row input{flex:1;min-width:120px}
.form-row select{min-width:110px}
.modal-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:50;align-items:center;justify-content:center}
.modal-bg.open{display:flex}
.modal{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:24px;width:440px;max-width:90vw;max-height:90vh;overflow-y:auto}
.modal h2{margin-bottom:16px}
.modal .form-row{flex-direction:column}
.modal input,.modal select,.modal textarea{background:var(--bg);border:1px solid var(--border);color:var(--text);padding:8px 12px;border-radius:6px;font-size:14px;width:100%}
.modal textarea{resize:vertical;min-height:60px;font-family:monospace}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:16px}
.project-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:16px;margin-bottom:12px;transition:.15s}
.project-card:hover{border-color:var(--accent)}
.project-card .head{display:flex;justify-content:space-between;align-items:center}
.project-card .tasks{margin-top:12px;border-top:1px solid var(--border);padding-top:12px}
.task-item{display:flex;align-items:center;gap:10px;padding:6px 0;font-size:13px}
.task-item .badge{font-size:11px}
.progress{font-size:12px;color:var(--dim)}
.actions{display:flex;gap:6px}
.empty{text-align:center;padding:40px;color:var(--dim)}
.dep-tag{display:inline-block;background:var(--bg);border:1px solid var(--border);border-radius:4px;padding:1px 6px;font-size:11px;color:var(--dim);margin-left:6px}
.openclaw-badge{display:inline-block;padding:1px 8px;border-radius:4px;font-size:11px;font-weight:600;background:#2a1a3a;color:var(--purple)}
.task-result{display:none;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:12px;margin:4px 0 4px 28px;font-size:12px;max-height:400px;overflow-y:auto}
.task-result.open{display:block}
.task-result .label{color:var(--dim);font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.task-result pre{white-space:pre-wrap;word-break:break-all;margin:0}
.task-running{color:var(--yellow);font-size:11px;animation:pulse 1s infinite}
@keyframes pulse{50%{opacity:.5}}
.heartbeat-log{max-height:400px;overflow-y:auto}
.hb-entry{display:flex;align-items:center;gap:12px;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
.hb-entry:last-child{border-bottom:none}
.hb-entry .time{color:var(--dim);font-size:11px;min-width:140px}
.hb-entry .agent{font-weight:600;min-width:80px}
.hb-entry .action{flex:1;color:var(--dim)}
.inline-btn{background:none;border:1px solid var(--border);color:var(--text);padding:2px 8px;border-radius:4px;cursor:pointer;font-size:11px;transition:.15s}
.inline-btn:hover{border-color:var(--accent);color:var(--accent)}
.sync-status{font-size:12px;color:var(--dim);margin-left:12px}
.ws-path{font-size:11px;color:var(--dim);font-family:monospace;margin-top:4px}
</style>
</head>
<body>
<nav>
  <button class="active" data-tab="dashboard">Dashboard</button>
  <button data-tab="agents">Agents</button>
  <button data-tab="projects">Projects</button>
  <button data-tab="heartbeats">Heartbeats</button>
</nav>
<div class="container">
  <!-- DASHBOARD -->
  <div id="tab-dashboard" class="tab active">
    <div class="stats" id="stats"></div>
    <h2>OpenClaw Agents</h2>
    <table><thead><tr><th>OpenClaw ID</th><th>Name</th><th>Status</th><th>Budget</th><th>Heartbeat</th></tr></thead><tbody id="dash-agents"></tbody></table>
    <h2 style="margin-top:24px">Projects</h2>
    <div id="dash-projects"></div>
  </div>
  <!-- AGENTS -->
  <div id="tab-agents" class="tab">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2>Agents</h2>
      <div>
        <button class="btn btn-purple" onclick="syncAgents()">🔄 Sync from OpenClaw</button>
        <span class="sync-status" id="sync-status"></span>
      </div>
    </div>
    <div class="form-row" style="margin-bottom:16px;flex-direction:row">
      <input id="a-title" placeholder="Job Title (e.g. Senior Security Engineer)">
      <input id="a-desc" placeholder="Job Description" style="flex:2">
      <button class="btn btn-primary" onclick="createAgent()">Add Agent</button>
    </div>
    <table><thead><tr><th>OpenClaw ID</th><th>Name</th><th>Status</th><th>Budget</th><th>Heartbeat</th><th>Actions</th></tr></thead><tbody id="agent-list"></tbody></table>
  </div>
  <!-- PROJECTS -->
  <div id="tab-projects" class="tab">
    <h2>Projects</h2>
    <div class="form-row" style="margin-bottom:16px">
      <input id="p-title" placeholder="Project title">
      <input id="p-desc" placeholder="Description">
      <input id="p-ws" placeholder="Workspace path (optional)">
      <select id="p-status"><option>active</option><option>completed</option><option>failed</option></select>
      <button class="btn btn-primary" onclick="createProject()">Add Project</button>
    </div>
    <div id="project-list"></div>
  </div>
  <!-- HEARTBEATS -->
  <div id="tab-heartbeats" class="tab">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <h2>Heartbeat Log</h2>
      <button class="btn btn-primary" onclick="tickHeartbeats()">▶ Tick Now</button>
    </div>
    <div id="heartbeat-log" class="heartbeat-log"></div>
  </div>
</div>

<!-- Edit Agent Modal -->
<div class="modal-bg" id="modal-agent">
  <div class="modal">
    <h2>Edit Agent</h2>
    <div class="form-row"><label>OpenClaw Agent ID</label><input id="ea-ocid" disabled style="opacity:.6"></div>
    <div class="form-row"><label>Name</label><input id="ea-name"></div>
    <div class="form-row"><label>Status</label><select id="ea-status"><option>idle</option><option>active</option><option>paused</option></select></div>
    <div class="form-row"><label>Budget Limit ($)</label><input id="ea-budget" type="number"></div>
    <div class="form-row"><label>Budget Spent ($)</label><input id="ea-spent" type="number"></div>
    <hr style="border-color:var(--border);margin:12px 0">
    <h3>Heartbeat</h3>
    <div class="form-row"><label>Enabled</label><select id="ea-hb-enabled"><option value="0">Disabled</option><option value="1">Enabled</option></select></div>
    <div class="form-row"><label>Interval (minutes)</label><input id="ea-hb-interval" type="number" min="1" max="1440"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-agent')">Cancel</button>
      <button class="btn btn-primary" id="ea-save">Save</button>
    </div>
  </div>
</div>

<!-- Edit Project Modal -->
<div class="modal-bg" id="modal-project">
  <div class="modal">
    <h2>Edit Project</h2>
    <div class="form-row"><label>Title</label><input id="ep-title"></div>
    <div class="form-row"><label>Description</label><textarea id="ep-desc"></textarea></div>
    <div class="form-row"><label>Workspace Path</label><input id="ep-ws" placeholder="/path/to/workspace"></div>
    <div class="form-row"><label>Status</label><select id="ep-status"><option>active</option><option>completed</option><option>failed</option></select></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-project')">Cancel</button>
      <button class="btn btn-primary" id="ep-save">Save</button>
    </div>
  </div>
</div>

<!-- Edit Task Modal -->
<div class="modal-bg" id="modal-task-edit">
  <div class="modal">
    <h2>Edit Task</h2>
    <div class="form-row"><label>Title</label><input id="et-title"></div>
    <div class="form-row"><label>Description</label><textarea id="et-desc"></textarea></div>
    <div class="form-row"><label>Assign to</label><select id="et-agent"><option value="">Unassigned</option></select></div>
    <div class="form-row"><label>Status</label><select id="et-status"><option value="pending">pending</option><option value="in_progress">in progress</option><option value="done">done</option><option value="failed">failed</option></select></div>
    <div class="form-row"><label>Depends on</label><select id="et-dep"><option value="">None</option></select></div>
    <div class="form-row"><label>Creates Agent (agent ID)</label><input id="et-creates-agent" placeholder="Leave empty if none"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-task-edit')">Cancel</button>
      <button class="btn btn-primary" id="et-save">Save</button>
    </div>
  </div>
</div>

<!-- Add Task Modal -->
<div class="modal-bg" id="modal-task">
  <div class="modal">
    <h2>Add Task</h2>
    <div class="form-row"><label>Title</label><input id="t-title"></div>
    <div class="form-row"><label>Description</label><textarea id="t-desc"></textarea></div>
    <div class="form-row"><label>Assign to</label><select id="t-agent"><option value="">Unassigned</option></select></div>
    <div class="form-row"><label>Depends on</label><select id="t-dep"><option value="">None</option></select></div>
    <div class="form-row"><label>Creates Agent (agent ID)</label><input id="t-creates-agent" placeholder="Leave empty if none"></div>
    <div class="modal-actions">
      <button class="btn" onclick="closeModal('modal-task')">Cancel</button>
      <button class="btn btn-primary" id="t-save">Add Task</button>
    </div>
  </div>
</div>

<script>
const API = '';
let allAgents = [];
let openResults = new Set();

document.querySelectorAll('nav button').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('nav button').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    document.getElementById('tab-' + b.dataset.tab).classList.add('active');
    loadTab(b.dataset.tab);
  });
});

function loadTab(tab) {
  if (tab === 'dashboard') loadDashboard();
  else if (tab === 'agents') loadAgents();
  else if (tab === 'projects') loadProjects();
  else if (tab === 'heartbeats') loadHeartbeats();
}

async function api(path, opts) {
  const r = await fetch(API + path, { headers: { 'Content-Type': 'application/json' }, ...opts });
  return r.json();
}

function badge(status) { return `<span class="badge badge-${status}">${status.replace('_',' ')}</span>`; }
function ocBadge(id) { return `<span class="openclaw-badge">⚙ ${id}</span>`; }
function hbBadge(agent) {
  if (!agent.heartbeat_enabled) return '<span style="color:var(--dim);font-size:11px">off</span>';
  return `<span style="color:var(--green);font-size:11px">● ${agent.heartbeat_interval}min · ${agent.last_heartbeat ? timeAgo(agent.last_heartbeat) : 'never'}</span>`;
}
function timeAgo(dateStr) {
  const diff = (Date.now() - new Date(dateStr)) / 1000;
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff/60) + 'm ago';
  if (diff < 86400) return Math.floor(diff/3600) + 'h ago';
  return Math.floor(diff/86400) + 'd ago';
}
function budgetBar(spent, limit) {
  if (!limit) return '—';
  const pct = Math.min(100, (spent / limit) * 100);
  const color = pct > 80 ? 'var(--red)' : pct > 50 ? 'var(--yellow)' : 'var(--accent)';
  return `$${spent.toFixed(0)} <span class="budget-bar"><span class="budget-fill" style="width:${pct}%;background:${color}"></span></span> $${limit.toFixed(0)}`;
}
function escHtml(str) { return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Dashboard
async function loadDashboard() {
  const d = await api('/api/dashboard');
  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="label">Agents</div><div class="value accent">${d.total_agents}</div></div>
    <div class="stat-card"><div class="label">Active Tasks</div><div class="value yellow">${d.active_tasks}</div></div>
    <div class="stat-card"><div class="label">Completed</div><div class="value green">${d.completed_tasks}</div></div>
    <div class="stat-card"><div class="label">Spend</div><div class="value">$${d.total_spent.toFixed(0)}</div></div>`;
  document.getElementById('dash-agents').innerHTML = d.agents.map(a => `<tr><td>${ocBadge(a.openclaw_agent_id)}</td><td>${a.name}</td><td>${badge(a.status)}</td><td>${budgetBar(a.budget_spent, a.budget_limit)}</td><td>${hbBadge(a)}</td></tr>`).join('');
  document.getElementById('dash-projects').innerHTML = (d.projects || []).map(p => `<div class="project-card"><div class="head"><span>${p.title} ${badge(p.status)}</span><span class="progress">${p.task_done}/${p.task_total} tasks</span></div></div>`).join('') || '<div class="empty">No projects yet</div>';
}

// Agents
async function loadAgents() {
  allAgents = await api('/api/agents');
  document.getElementById('agent-list').innerHTML = allAgents.map(a => `<tr><td>${ocBadge(a.openclaw_agent_id)}</td><td>${a.name}</td><td>${badge(a.status)}</td><td>$${a.budget_limit.toFixed(0)}</td><td>${hbBadge(a)}</td><td class="actions"><button class="btn btn-sm btn-primary" onclick="editAgent(${a.id})">Edit</button><button class="btn btn-sm btn-success" onclick="triggerHeartbeat(${a.id})">♥</button><button class="btn btn-sm btn-danger" onclick="deleteAgent(${a.id})">Del</button></td></tr>`).join('') || '<tr><td colspan="6" class="empty">No agents — click Sync</td></tr>';
}

async function syncAgents() {
  const el = document.getElementById('sync-status');
  el.textContent = 'Syncing...';
  try { const r = await api('/api/agents/sync', { method: 'POST' }); el.textContent = `Synced ${r.count}: ${r.synced.join(', ') || 'none'}`; el.style.color = 'var(--green)'; loadAgents(); } catch (e) { el.textContent = 'Failed'; el.style.color = 'var(--red)'; }
  setTimeout(() => { el.textContent = ''; }, 5000);
}

async function createAgent() {
  const title = document.getElementById('a-title').value.trim();
  const desc = document.getElementById('a-desc').value.trim();
  if (!title) return;
  const openclaw_agent_id = title.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/^-|-$/g, '');
  try {
    await api('/api/agents', { method: 'POST', body: JSON.stringify({
      job_title: title,
      job_description: desc
    }) });
    document.getElementById('a-title').value = ''; document.getElementById('a-desc').value = '';
    loadAgents();
  } catch (e) { alert('Error: ' + (e.message || 'failed')); }
}

async function editAgent(id) {
  const a = allAgents.find(x => x.id === id); if (!a) return;
  document.getElementById('ea-ocid').value = a.openclaw_agent_id;
  document.getElementById('ea-name').value = a.name;
  document.getElementById('ea-status').value = a.status;
  document.getElementById('ea-budget').value = a.budget_limit;
  document.getElementById('ea-spent').value = a.budget_spent;
  document.getElementById('ea-hb-enabled').value = a.heartbeat_enabled ? 1 : 0;
  document.getElementById('ea-hb-interval').value = a.heartbeat_interval;
  document.getElementById('ea-save').onclick = async () => {
    await api('/api/agents/' + id, { method: 'PUT', body: JSON.stringify({ name: document.getElementById('ea-name').value, status: document.getElementById('ea-status').value, budget_limit: +document.getElementById('ea-budget').value, budget_spent: +document.getElementById('ea-spent').value, heartbeat_enabled: +document.getElementById('ea-hb-enabled').value, heartbeat_interval: +document.getElementById('ea-hb-interval').value }) });
    closeModal('modal-agent'); loadAgents();
  };
  document.getElementById('modal-agent').classList.add('open');
}

async function deleteAgent(id) { if (!confirm('Delete this agent?')) return; await api('/api/agents/' + id, { method: 'DELETE' }); loadAgents(); }
async function triggerHeartbeat(id) { const r = await api('/api/agents/' + id + '/heartbeat', { method: 'POST' }); alert(`${r.agent}: ${r.action}${r.task_title ? ' — ' + r.task_title : ''}`); loadAgents(); }

// Projects
async function loadProjects() {
  const projects = await api('/api/projects');
  allAgents = await api('/api/agents');
  let html = '';
  for (const p of projects) {
    const detail = await api('/api/projects/' + p.id);
    html += `<div class="project-card" id="project-${p.id}">
      <div class="head">
        <span><strong>${p.title}</strong> ${badge(p.status)}</span>
        <span class="progress">${p.task_done}/${p.task_total} tasks
          <button class="btn btn-sm btn-primary" style="margin-left:8px" onclick="editProject(${p.id})">Edit</button>
          <button class="btn btn-sm btn-danger" style="margin-left:4px" onclick="deleteProject(${p.id})">Del</button>
        </span>
      </div>
      ${p.workspace_path ? `<div class="ws-path">📁 ${escHtml(p.workspace_path)}</div>` : ''}
      <div class="tasks">
        ${p.description ? `<p style="color:var(--dim);margin-bottom:10px;font-size:13px">${escHtml(p.description)}</p>` : ''}
        ${detail.tasks.map(t => `
          <div class="task-item" id="task-${t.id}">
            ${badge(t.status)}
            <span style="flex:1">
              ${escHtml(t.title)}
              ${t.agent_name ? '<span style="color:var(--dim)">· ' + t.agent_name + ' ' + ocBadge(t.openclaw_agent_id) + '</span>' : ''}
              ${t.dep_title ? '<span class="dep-tag">blocked by: ' + escHtml(t.dep_title) + '</span>' : ''}
              ${t.creates_agent ? '<span class="dep-tag" style="color:var(--purple);border-color:var(--purple)">🏗 creates: ' + escHtml(t.creates_agent) + '</span>' : ''}
              ${t.created_by_agent_slug ? '<span class="dep-tag" style="color:var(--orange);border-color:var(--orange)">✎ by ' + t.created_by_agent_slug + '</span>' : ''}
            </span>
            <span id="task-status-${t.id}"></span>
            <button class="inline-btn" onclick="runTask(${t.id})" ${!t.assigned_agent_id?'disabled style="opacity:.4"':''}>▶ Run</button>
            <button class="inline-btn" onclick="toggleResults(${t.id})">📄 Output</button>
            <button class="inline-btn" onclick="editTask(${t.id},${p.id})">✏️</button>
            <button class="inline-btn" onclick="deleteTask(${t.id},${p.id})" title="Delete">🗑️</button>
            <select onchange="updateTaskStatus(${t.id},this.value)" style="background:var(--bg);border:1px solid var(--border);color:var(--text);padding:2px 6px;border-radius:4px;font-size:12px">
              <option ${t.status==='pending'?'selected':''} value="pending">pending</option>
              <option ${t.status==='in_progress'?'selected':''} value="in_progress">in progress</option>
              <option ${t.status==='done'?'selected':''} value="done">done</option>
              <option ${t.status==='failed'?'selected':''} value="failed">failed</option>
            </select>
          </div>
          <div class="task-result" id="task-result-${t.id}"></div>
        `).join('') || '<p style="color:var(--dim);font-size:13px">No tasks yet</p>'}
        <button class="btn btn-sm btn-primary" style="margin-top:10px" onclick="openAddTask(${p.id},${JSON.stringify(detail.tasks).replace(/"/g,'&quot;')})">+ Add Task</button>
      </div>
    </div>`;
  }
  document.getElementById('project-list').innerHTML = html || '<div class="empty">No projects yet</div>';
  restoreOpenResults();
}

async function createProject() {
  const title = document.getElementById('p-title').value.trim();
  if (!title) return;
  await api('/api/projects', { method: 'POST', body: JSON.stringify({ title, description: document.getElementById('p-desc').value, workspace_path: document.getElementById('p-ws').value, status: document.getElementById('p-status').value }) });
  document.getElementById('p-title').value = ''; document.getElementById('p-desc').value = ''; document.getElementById('p-ws').value = '';
  loadProjects();
}

async function editProject(id) {
  const projects = await api('/api/projects');
  const p = projects.find(x => x.id === id); if (!p) return;
  document.getElementById('ep-title').value = p.title;
  document.getElementById('ep-desc').value = p.description;
  document.getElementById('ep-ws').value = p.workspace_path || '';
  document.getElementById('ep-status').value = p.status;
  document.getElementById('ep-save').onclick = async () => {
    await api('/api/projects/' + id, { method: 'PUT', body: JSON.stringify({ title: document.getElementById('ep-title').value, description: document.getElementById('ep-desc').value, workspace_path: document.getElementById('ep-ws').value, status: document.getElementById('ep-status').value }) });
    closeModal('modal-project'); loadProjects();
  };
  document.getElementById('modal-project').classList.add('open');
}

async function deleteProject(id) { if (!confirm('Delete this project and all tasks?')) return; await api('/api/projects/' + id, { method: 'DELETE' }); loadProjects(); }
async function deleteTask(id, projectId) { if (!confirm('Delete this task?')) return; await api('/api/tasks/' + id, { method: 'DELETE' }); loadProjectDetail(projectId); }

async function editTask(taskId, projectId) {
  const detail = await api('/api/projects/' + projectId);
  const t = detail.tasks.find(x => x.id === taskId); if (!t) return;
  document.getElementById('et-title').value = t.title;
  document.getElementById('et-desc').value = t.description || '';
  document.getElementById('et-status').value = t.status;
  document.getElementById('et-agent').innerHTML = '<option value="">Unassigned</option>' + allAgents.map(a => `<option value="${a.id}" ${t.assigned_agent_id===a.id?'selected':''}>${a.name} (${a.openclaw_agent_id})</option>`).join('');
  document.getElementById('et-dep').innerHTML = '<option value="">None</option>' + detail.tasks.filter(x => x.id !== taskId).map(x => `<option value="${x.id}" ${t.dependency_id===x.id?'selected':''}>${x.title}</option>`).join('');
  document.getElementById('et-creates-agent').value = t.creates_agent || '';
  document.getElementById('et-save').onclick = async () => {
    await api('/api/tasks/' + taskId, { method: 'PUT', body: JSON.stringify({
      title: document.getElementById('et-title').value,
      description: document.getElementById('et-desc').value,
      status: document.getElementById('et-status').value,
      assigned_agent_id: document.getElementById('et-agent').value || null,
      dependency_id: document.getElementById('et-dep').value || null,
      creates_agent: document.getElementById('et-creates-agent').value.trim() || null
    }) });
    closeModal('modal-task-edit'); loadProjects();
  };
  document.getElementById('modal-task-edit').classList.add('open');
}

function openAddTask(projectId, tasks) {
  document.getElementById('t-agent').innerHTML = '<option value="">Unassigned</option>' + allAgents.map(a => `<option value="${a.id}">${a.name} (${a.openclaw_agent_id})</option>`).join('');
  document.getElementById('t-dep').innerHTML = '<option value="">None</option>' + tasks.map(t => `<option value="${t.id}">${t.title}</option>`).join('');
  document.getElementById('t-title').value = ''; document.getElementById('t-desc').value = ''; document.getElementById('t-creates-agent').value = '';
  document.getElementById('t-save').onclick = async () => {
    const title = document.getElementById('t-title').value.trim(); if (!title) return;
    await api('/api/projects/' + projectId + '/tasks', { method: 'POST', body: JSON.stringify({
      title, description: document.getElementById('t-desc').value,
      assigned_agent_id: document.getElementById('t-agent').value || null,
      dependency_id: document.getElementById('t-dep').value || null,
      creates_agent: document.getElementById('t-creates-agent').value.trim() || null
    }) });
    closeModal('modal-task'); loadProjects();
  };
  document.getElementById('modal-task').classList.add('open');
}

async function updateTaskStatus(id, status) { await api('/api/tasks/' + id, { method: 'PUT', body: JSON.stringify({ status }) }); }

async function runTask(id) {
  const statusEl = document.getElementById('task-status-' + id);
  const resultEl = document.getElementById('task-result-' + id);
  statusEl.innerHTML = '<span class="task-running">running...</span>';
  resultEl.classList.remove('open');
  try {
    const result = await api('/api/tasks/' + id + '/run', { method: 'POST' });
    statusEl.innerHTML = badge(result.action === 'completed' ? 'done' : 'failed');
    const taskItem = document.getElementById('task-' + id);
    if (taskItem) { const b = taskItem.querySelector('.badge'); if (b) { b.className = 'badge badge-' + (result.action === 'completed' ? 'done' : 'failed'); b.textContent = result.action === 'completed' ? 'done' : 'failed'; } }
    openResults.add(id);
    const results = await api('/api/tasks/' + id + '/results');
    renderResults(resultEl, results); resultEl.classList.add('open');
  } catch (err) {
    statusEl.innerHTML = badge('failed');
    openResults.add(id);
    resultEl.innerHTML = `<div class="label">Error</div><pre style="color:var(--red)">${escHtml(err.error || err.message || 'task execution failed')}</pre>`;
    resultEl.classList.add('open');
  }
}

async function toggleResults(taskId) {
  const el = document.getElementById('task-result-' + taskId);
  if (el.classList.contains('open')) { el.classList.remove('open'); openResults.delete(taskId); return; }
  openResults.add(taskId);
  const results = await api('/api/tasks/' + taskId + '/results');
  renderResults(el, results); el.classList.add('open');
}

function renderResults(el, results) {
  if (results.length === 0) { el.innerHTML = '<div style="color:var(--dim)">No execution results yet</div>'; return; }
  el.innerHTML = results.map(r => {
    let output; try { const p = JSON.parse(r.output); output = p.reply || p.message || p.text || p.raw || JSON.stringify(p, null, 2); } catch { output = r.output; }
    return `<div style="margin-bottom:10px"><div style="color:var(--dim);font-size:10px;margin-bottom:6px">${new Date(r.executed_at).toLocaleString()}</div><div class="label">Sent to Agent</div><pre style="color:var(--yellow);margin-bottom:8px">${escHtml(r.input)}</pre><div class="label">Agent Response</div><pre>${escHtml(output)}</pre></div>`;
  }).join('');
}

function restoreOpenResults() {
  openResults.forEach(async taskId => {
    const el = document.getElementById('task-result-' + taskId);
    if (el && !el.classList.contains('open')) {
      const results = await api('/api/tasks/' + taskId + '/results');
      renderResults(el, results); el.classList.add('open');
    }
  });
}

// Heartbeats
async function loadHeartbeats() {
  const hbs = await api('/api/heartbeats?limit=100');
  document.getElementById('heartbeat-log').innerHTML = hbs.map(h => {
    let action; try { action = JSON.parse(h.action_taken); } catch { action = { raw: h.action_taken }; }
    const s = action.action === 'completed' ? `Completed "${action.task_title}" via ${action.agent_id || ''}` : action.action === 'failed' ? `Failed "${action.task_title}" — ${action.error || ''}` : action.action === 'idle' ? 'No pending tasks' : JSON.stringify(action);
    return `<div class="hb-entry"><span class="time">${new Date(h.triggered_at).toLocaleString()}</span><span class="agent">${h.agent_name || 'Agent ' + h.agent_id} ${h.openclaw_agent_id ? ocBadge(h.openclaw_agent_id) : ''}</span><span class="action">${s}</span>${badge(h.status)}</div>`;
  }).join('') || '<div class="empty">No heartbeat activity yet</div>';
}

async function tickHeartbeats() { const r = await api('/api/heartbeats/tick', { method: 'POST' }); alert(`Ticked: ${r.ticked} agent(s)`); loadHeartbeats(); }

function closeModal(id) { document.getElementById(id).classList.remove('open'); }
document.querySelectorAll('.modal-bg').forEach(m => m.addEventListener('click', e => { if (e.target === m) m.classList.remove('open'); }));

loadDashboard();
</script>
